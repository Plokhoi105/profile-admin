<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Profile Admin</title>
<script src="https://telegram.org/js/telegram-web-app.js"></script>
<style>
  :root {
    --bg: #0a0e14;
    --bg-card: #131920;
    --bg-input: #1a2230;
    --accent: #00d4aa;
    --accent-dim: rgba(0, 212, 170, 0.15);
    --text: #e6edf3;
    --text-dim: #7d8590;
    --danger: #f85149;
    --warning: #d29922;
    --success: #3fb950;
    --border: #21262d;
    --radius: 12px;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
    background: var(--tg-theme-bg-color, var(--bg));
    color: var(--tg-theme-text-color, var(--text));
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    -webkit-tap-highlight-color: transparent;
    padding-bottom: 72px;
  }

  /* Header */
  .header {
    padding: 16px 20px 12px;
    text-align: center;
    border-bottom: 1px solid var(--border);
  }
  .header h1 {
    font-size: 18px;
    font-weight: 600;
    color: var(--accent);
  }

  /* Tab content */
  .tab-content {
    flex: 1;
    padding: 16px;
    display: none;
    overflow-y: auto;
  }
  .tab-content.active { display: block; }

  /* Cards */
  .card {
    background: var(--bg-card);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 16px;
    margin-bottom: 12px;
  }
  .card-title {
    font-size: 13px;
    font-weight: 500;
    color: var(--text-dim);
    text-transform: uppercase;
    letter-spacing: 0.5px;
    margin-bottom: 12px;
  }

  /* Metrics grid */
  .metrics {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 10px;
  }
  .metric {
    background: var(--bg-input);
    border-radius: 10px;
    padding: 14px;
    text-align: center;
  }
  .metric-value {
    font-size: 28px;
    font-weight: 700;
    color: var(--accent);
    line-height: 1.1;
  }
  .metric-value.warn { color: var(--warning); }
  .metric-value.danger { color: var(--danger); }
  .metric-value.success { color: var(--success); }
  .metric-label {
    font-size: 12px;
    color: var(--text-dim);
    margin-top: 4px;
  }

  /* Buttons */
  .btn {
    display: block;
    width: 100%;
    min-height: 48px;
    border: none;
    border-radius: 10px;
    font-size: 15px;
    font-weight: 600;
    cursor: pointer;
    transition: opacity 0.2s, transform 0.1s;
    padding: 12px 20px;
  }
  .btn:active { transform: scale(0.98); }
  .btn:disabled { opacity: 0.4; cursor: not-allowed; transform: none; }
  .btn-primary {
    background: var(--accent);
    color: #000;
  }
  .btn-secondary {
    background: var(--bg-input);
    color: var(--text);
    border: 1px solid var(--border);
  }
  .btn-danger {
    background: var(--danger);
    color: #fff;
  }
  .btn + .btn { margin-top: 10px; }

  /* Form */
  label {
    display: block;
    font-size: 13px;
    color: var(--text-dim);
    margin-bottom: 6px;
    font-weight: 500;
  }
  textarea, input[type="text"], select {
    width: 100%;
    background: var(--bg-input);
    color: var(--text);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 12px 14px;
    font-size: 15px;
    font-family: inherit;
    outline: none;
    transition: border-color 0.2s;
    -webkit-appearance: none;
  }
  textarea:focus, input[type="text"]:focus, select:focus {
    border-color: var(--accent);
  }
  textarea { resize: vertical; min-height: 120px; }
  select { min-height: 48px; }
  .form-group { margin-bottom: 14px; }
  .form-row {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 10px;
  }

  /* Account list */
  .account-item {
    padding: 12px 14px;
    background: var(--bg-card);
    border: 1px solid var(--border);
    border-radius: 10px;
    margin-bottom: 8px;
  }
  .account-header {
    display: flex;
    align-items: center;
    gap: 10px;
  }
  .account-status {
    width: 10px;
    height: 10px;
    border-radius: 50%;
    flex-shrink: 0;
  }
  .account-status.created { background: var(--success); }
  .account-status.not_created { background: var(--text-dim); }
  .account-status.ready { background: var(--text-dim); }
  .account-status.pending_sync { background: var(--warning); }
  .account-status.pending { background: var(--warning); }
  .account-status.error { background: var(--danger); }
  .account-status.queued, .account-status.running { background: var(--accent); }
  .account-info { flex: 1; min-width: 0; }
  .account-name {
    font-size: 14px;
    font-weight: 500;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }
  .account-meta {
    font-size: 12px;
    color: var(--text-dim);
    margin-top: 2px;
  }
  .account-tags {
    display: flex;
    gap: 6px;
    margin-top: 8px;
    flex-wrap: wrap;
  }
  .account-tag {
    display: inline-flex;
    align-items: center;
    gap: 4px;
    padding: 4px 10px;
    border-radius: 14px;
    font-size: 11px;
    font-weight: 500;
    background: var(--bg-input);
    color: var(--text-dim);
    border: 1px solid var(--border);
    cursor: pointer;
    transition: all 0.2s;
  }
  .account-tag:active { transform: scale(0.95); }
  .account-tag.tag-country { color: #3b82f6; border-color: rgba(59,130,246,0.3); }
  .account-tag.tag-os { color: #a78bfa; border-color: rgba(167,139,250,0.3); }
  .account-actions {
    display: flex;
    gap: 6px;
    margin-top: 8px;
    padding-top: 8px;
    border-top: 1px solid var(--border);
  }
  .act-btn {
    flex: 1;
    min-height: 34px;
    border: 1px solid var(--border);
    border-radius: 8px;
    background: var(--bg-input);
    color: var(--text-dim);
    font-size: 11px;
    font-weight: 500;
    cursor: pointer;
    transition: all 0.2s;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 4px;
  }
  .act-btn:active { transform: scale(0.95); }
  .act-btn:disabled { opacity: 0.3; }
  .act-btn.act-create { color: var(--accent); border-color: rgba(0,212,170,0.3); }
  .act-btn.act-sync { color: #8b5cf6; border-color: rgba(139,92,246,0.3); }
  .act-btn.act-fraud { color: var(--warning); border-color: rgba(210,153,34,0.3); }
  .act-btn.act-proxy { color: #3b82f6; border-color: rgba(59,130,246,0.3); }
  .act-btn.act-delete { color: var(--danger); border-color: rgba(248,81,73,0.3); }

  /* Country/OS picker modal */
  .picker-overlay {
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.6);
    z-index: 150;
    display: flex;
    align-items: flex-end;
    justify-content: center;
  }
  .picker-sheet {
    background: var(--bg-card);
    border-radius: 16px 16px 0 0;
    width: 100%;
    max-width: 420px;
    max-height: 60vh;
    overflow-y: auto;
    padding: 16px;
  }
  .picker-title {
    font-size: 15px;
    font-weight: 600;
    margin-bottom: 12px;
    text-align: center;
  }
  .picker-grid {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 8px;
  }
  .picker-option {
    padding: 10px 8px;
    border-radius: 10px;
    background: var(--bg-input);
    border: 1px solid var(--border);
    color: var(--text);
    font-size: 13px;
    font-weight: 500;
    cursor: pointer;
    text-align: center;
    transition: all 0.2s;
  }
  .picker-option:active { transform: scale(0.95); }
  .picker-option.selected {
    background: var(--accent-dim);
    border-color: var(--accent);
    color: var(--accent);
  }

  /* Bottom nav */
  .bottom-nav {
    position: fixed;
    bottom: 0;
    left: 0;
    right: 0;
    background: var(--bg-card);
    border-top: 1px solid var(--border);
    display: flex;
    height: 64px;
    z-index: 100;
    padding-bottom: env(safe-area-inset-bottom, 0);
  }
  .nav-item {
    flex: 1;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 4px;
    background: none;
    border: none;
    color: var(--text-dim);
    font-size: 11px;
    font-weight: 500;
    cursor: pointer;
    transition: color 0.2s;
    -webkit-tap-highlight-color: transparent;
  }
  .nav-item.active { color: var(--accent); }
  .nav-item svg { width: 22px; height: 22px; }

  /* Toast */
  .toast {
    position: fixed;
    top: 20px;
    left: 16px;
    right: 16px;
    padding: 14px 16px;
    border-radius: 10px;
    font-size: 14px;
    font-weight: 500;
    z-index: 200;
    transform: translateY(-100px);
    opacity: 0;
    transition: all 0.3s ease;
  }
  .toast.show { transform: translateY(0); opacity: 1; }
  .toast.success { background: #1a3a2a; color: var(--success); border: 1px solid #264f36; }
  .toast.error { background: #3a1a1a; color: var(--danger); border: 1px solid #4f2626; }

  /* Loading */
  .spinner {
    display: inline-block;
    width: 18px;
    height: 18px;
    border: 2px solid transparent;
    border-top-color: currentColor;
    border-radius: 50%;
    animation: spin 0.7s linear infinite;
    vertical-align: middle;
    margin-right: 6px;
  }
  @keyframes spin { to { transform: rotate(360deg); } }

  .empty-state {
    text-align: center;
    color: var(--text-dim);
    padding: 40px 20px;
    font-size: 14px;
  }

  /* Filter chips */
  .filter-bar {
    display: flex;
    gap: 8px;
    overflow-x: auto;
    padding-bottom: 12px;
    -webkit-overflow-scrolling: touch;
  }
  .filter-bar::-webkit-scrollbar { display: none; }
  .chip {
    flex-shrink: 0;
    padding: 6px 14px;
    border-radius: 20px;
    font-size: 13px;
    font-weight: 500;
    background: var(--bg-input);
    color: var(--text-dim);
    border: 1px solid var(--border);
    cursor: pointer;
    transition: all 0.2s;
  }
  .chip.active {
    background: var(--accent-dim);
    color: var(--accent);
    border-color: var(--accent);
  }
</style>
</head>
<body>

<div class="header">
  <h1>Profile Admin</h1>
</div>

<!-- Status Tab -->
<div id="tab-status" class="tab-content active">
  <div class="card">
    <div class="card-title">Overview</div>
    <div class="metrics" id="metrics-grid">
      <div class="metric">
        <div class="metric-value" id="m-created">-</div>
        <div class="metric-label">Created</div>
      </div>
      <div class="metric">
        <div class="metric-value warn" id="m-pending">-</div>
        <div class="metric-label">Pending</div>
      </div>
      <div class="metric">
        <div class="metric-value" id="m-not-created">-</div>
        <div class="metric-label">Not Created</div>
      </div>
      <div class="metric">
        <div class="metric-value danger" id="m-errors">-</div>
        <div class="metric-label">Errors</div>
      </div>
    </div>
  </div>

  <div class="card">
    <div class="card-title">Quick Actions</div>
    <button class="btn btn-primary" id="btn-create-all" onclick="createAllProfiles()">
      Create All Not Created
    </button>
    <button class="btn btn-secondary" id="btn-sync" onclick="syncProfiles()">
      Sync with Vision
    </button>
    <button class="btn btn-secondary" onclick="loadStatus()">
      Refresh
    </button>
  </div>
</div>

<!-- Import Tab -->
<div id="tab-import" class="tab-content">
  <div class="card">
    <div class="card-title">Import Accounts</div>
    <div class="form-group">
      <label for="import-text">Emails (email:code per line)</label>
      <textarea id="import-text" placeholder="email@example.com:password123&#10;user@mail.com:pass456"></textarea>
    </div>
    <div class="form-group">
      <label for="import-prefix">Prefix</label>
      <input type="text" id="import-prefix" placeholder="e.g. batch01">
    </div>
    <div class="form-row">
      <div class="form-group">
        <label for="import-country">Country</label>
        <select id="import-country">
          <option value="">Loading...</option>
        </select>
      </div>
      <div class="form-group">
        <label for="import-os">OS</label>
        <select id="import-os">
          <option value="win">Windows</option>
          <option value="mac">macOS</option>
          <option value="lin">Linux</option>
          <option value="android">Android</option>
        </select>
      </div>
    </div>
    <button class="btn btn-primary" id="btn-import" onclick="importAccounts()">
      Import
    </button>
  </div>
</div>

<!-- Accounts Tab -->
<div id="tab-accounts" class="tab-content">
  <div class="filter-bar" id="filter-bar">
    <button class="chip active" data-filter="all" onclick="filterAccounts('all', this)">All</button>
    <button class="chip" data-filter="created" onclick="filterAccounts('created', this)">Created</button>
    <button class="chip" data-filter="not_created" onclick="filterAccounts('not_created', this)">Not Created</button>
    <button class="chip" data-filter="pending" onclick="filterAccounts('pending', this)">Pending</button>
    <button class="chip" data-filter="error" onclick="filterAccounts('error', this)">Error</button>
  </div>
  <div id="accounts-list"></div>
</div>

<!-- Bottom Navigation -->
<nav class="bottom-nav">
  <button class="nav-item active" data-tab="status" onclick="switchTab('status', this)">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
      <rect x="3" y="3" width="7" height="7" rx="1"/><rect x="14" y="3" width="7" height="7" rx="1"/>
      <rect x="3" y="14" width="7" height="7" rx="1"/><rect x="14" y="14" width="7" height="7" rx="1"/>
    </svg>
    Status
  </button>
  <button class="nav-item" data-tab="import" onclick="switchTab('import', this)">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
      <path d="M21 15v4a2 2 0 01-2 2H5a2 2 0 01-2-2v-4"/>
      <polyline points="17 8 12 3 7 8"/><line x1="12" y1="3" x2="12" y2="15"/>
    </svg>
    Import
  </button>
  <button class="nav-item" data-tab="accounts" onclick="switchTab('accounts', this)">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
      <path d="M17 21v-2a4 4 0 00-4-4H5a4 4 0 00-4-4v2"/>
      <circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 00-3-3.87"/>
      <path d="M16 3.13a4 4 0 010 7.75"/>
    </svg>
    Accounts
  </button>
</nav>

<!-- Toast -->
<div class="toast" id="toast"></div>

<script>
const tg = window.Telegram && window.Telegram.WebApp;
let initData = '';
let allAccounts = [];
let currentFilter = 'all';
let countries = [];

if (tg) {
  tg.ready();
  tg.expand();
  initData = tg.initData || '';
}

function api(method, path, body) {
  const opts = {
    method: method,
    headers: {
      'Content-Type': 'application/json',
    },
  };
  if (initData) {
    opts.headers['X-Telegram-Init-Data'] = initData;
  }
  if (body !== undefined) {
    opts.body = JSON.stringify(body);
  }
  return fetch(path, opts).then(r => {
    if (!r.ok) return r.json().then(d => Promise.reject(d));
    return r.json();
  });
}

function toast(msg, type) {
  const el = document.getElementById('toast');
  el.textContent = msg;
  el.className = 'toast ' + type + ' show';
  setTimeout(() => el.classList.remove('show'), 3000);
}

function switchTab(name, btn) {
  document.querySelectorAll('.tab-content').forEach(t => t.classList.remove('active'));
  document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
  document.getElementById('tab-' + name).classList.add('active');
  btn.classList.add('active');
  if (name === 'status') loadStatus();
  if (name === 'accounts') loadAccounts();
  if (name === 'import' && countries.length === 0) loadCountries();
}

function loadStatus() {
  api('GET', '/api/accounts').then(data => {
    allAccounts = data.accounts || [];
    updateMetrics();
  }).catch(() => toast('Failed to load status', 'error'));
}

function updateMetrics() {
  let created = 0, pending = 0, notCreated = 0, errors = 0;
  allAccounts.forEach(a => {
    if (a.status === 'created') created++;
    else if (a.status === 'pending' || a.status === 'queued' || a.status === 'running') pending++;
    else if (a.status === 'not_created') notCreated++;
    else if (a.status === 'error') errors++;
    else created++; // count others like rotating, deleting with created
  });
  document.getElementById('m-created').textContent = created;
  document.getElementById('m-pending').textContent = pending;
  document.getElementById('m-not-created').textContent = notCreated;
  document.getElementById('m-errors').textContent = errors;
}

function loadAccounts() {
  api('GET', '/api/accounts').then(data => {
    allAccounts = data.accounts || [];
    updateMetrics();
    renderAccounts();
  }).catch(() => toast('Failed to load accounts', 'error'));
}

function renderAccounts() {
  const list = document.getElementById('accounts-list');
  let filtered = allAccounts;
  if (currentFilter !== 'all') {
    if (currentFilter === 'pending') {
      filtered = allAccounts.filter(a => ['pending', 'queued', 'running'].includes(a.status));
    } else {
      filtered = allAccounts.filter(a => a.status === currentFilter);
    }
  }
  if (filtered.length === 0) {
    list.innerHTML = '<div class="empty-state">No accounts found</div>';
    return;
  }
  list.innerHTML = filtered.map(a => {
    const statusClass = a.status || 'not_created';
    const countryLabel = a.country ? a.country.toUpperCase() : 'Страна';
    const osLabel = a.fingerprint_os === 'mac' ? 'macOS' : 'Windows';
    const isCreated = a.status === 'created';
    const isNotCreated = a.status === 'not_created' || a.status === 'ready';
    const isPending = a.status === 'pending_sync';
    const isBusy = ['queued','running','rotating','deleting'].includes(a.status);
    let actions = '';
    if (isNotCreated) {
      actions = '<div class="account-actions">' +
        '<button class="act-btn act-create" onclick="createOne(' + a.id + ',this)">➕ Создать</button>' +
        '<button class="act-btn act-delete" onclick="deleteOne(' + a.id + ',this)">🗑 Удалить</button>' +
      '</div>';
    } else if (isCreated || isPending) {
      actions = '<div class="account-actions">' +
        '<button class="act-btn act-sync" onclick="syncOne(' + a.id + ',this)">↻ Синхр</button>' +
        '<button class="act-btn act-fraud" onclick="fraudCheck(' + a.id + ',this)">⬥ Fraud</button>' +
        '<button class="act-btn act-proxy" onclick="rotateProxy(' + a.id + ',this)">⟳ Прокси</button>' +
        '<button class="act-btn act-delete" onclick="deleteOne(' + a.id + ',this)">🗑</button>' +
      '</div>';
    }
    const tags = '<div class="account-tags">' +
      '<span class="account-tag tag-country" onclick="pickCountry(' + a.id + ')">' + escapeHtml(countryLabel) + '</span>' +
      '<span class="account-tag tag-os" onclick="pickOS(' + a.id + ')">' + escapeHtml(osLabel) + '</span>' +
      (a.fraud_score >= 0 ? '<span class="account-tag">fraud: ' + a.fraud_score + '</span>' : '') +
    '</div>';
    return '<div class="account-item">' +
      '<div class="account-header">' +
        '<div class="account-status ' + statusClass + '"></div>' +
        '<div class="account-info">' +
          '<div class="account-name">' + escapeHtml(a.profile_name || a.email) + '</div>' +
          '<div class="account-meta">' + escapeHtml(a.email) + '</div>' +
        '</div>' +
      '</div>' +
      tags +
      actions +
    '</div>';
  }).join('');
}

function filterAccounts(filter, btn) {
  currentFilter = filter;
  document.querySelectorAll('.chip').forEach(c => c.classList.remove('active'));
  btn.classList.add('active');
  renderAccounts();
}

function loadCountries() {
  api('GET', '/api/countries').then(data => {
    countries = data.countries || [];
    const sel = document.getElementById('import-country');
    sel.innerHTML = '<option value="">-- Select --</option>' +
      countries.map(c => '<option value="' + escapeHtml(c.code) + '">' +
        escapeHtml(c.name || c.code) + '</option>').join('');
  }).catch(() => {
    document.getElementById('import-country').innerHTML =
      '<option value="">Failed to load</option>';
  });
}

function importAccounts() {
  const text = document.getElementById('import-text').value.trim();
  if (!text) { toast('Enter emails to import', 'error'); return; }
  const prefix = document.getElementById('import-prefix').value.trim();
  const country = document.getElementById('import-country').value;
  const os = document.getElementById('import-os').value;
  const btn = document.getElementById('btn-import');
  btn.disabled = true;
  btn.innerHTML = '<span class="spinner"></span>Importing...';
  api('POST', '/api/import', {
    text: text,
    prefix: prefix,
    default_country: country,
    default_os: os
  }).then(data => {
    const imported = (data.inserted || 0) + (data.updated || 0);
    const errors = (data.invalid || []).length;
    let msg = imported + ' imported';
    if (data.skipped) msg += ', ' + data.skipped + ' skipped';
    if (errors) msg += ', ' + errors + ' invalid';
    toast(msg, errors && !imported ? 'error' : 'success');
    document.getElementById('import-text').value = '';
  }).catch(e => {
    toast(e.error || 'Import failed', 'error');
  }).finally(() => {
    btn.disabled = false;
    btn.textContent = 'Import';
  });
}

function createAllProfiles() {
  const notCreated = allAccounts.filter(a => a.status === 'not_created');
  if (notCreated.length === 0) {
    toast('No profiles to create', 'error');
    return;
  }
  if (tg && tg.showConfirm) {
    tg.showConfirm(
      'Create ' + notCreated.length + ' profiles?',
      function(ok) { if (ok) doCreateAll(notCreated); }
    );
  } else if (confirm('Create ' + notCreated.length + ' profiles?')) {
    doCreateAll(notCreated);
  }
}

function doCreateAll(accounts) {
  const btn = document.getElementById('btn-create-all');
  btn.disabled = true;
  btn.innerHTML = '<span class="spinner"></span>Creating...';
  const ids = accounts.map(a => a.id);
  api('POST', '/api/jobs', { account_ids: ids }).then(data => {
    toast('Job #' + data.job_id + ' started for ' + ids.length + ' profiles', 'success');
    setTimeout(loadStatus, 2000);
  }).catch(e => {
    toast(e.error || 'Failed to start job', 'error');
  }).finally(() => {
    btn.disabled = false;
    btn.textContent = 'Create All Not Created';
  });
}

function syncProfiles() {
  const btn = document.getElementById('btn-sync');
  btn.disabled = true;
  btn.innerHTML = '<span class="spinner"></span>Syncing...';
  api('POST', '/api/sync', {}).then(data => {
    toast('Synced: ' + data.synced + ', Missing: ' + data.missing, 'success');
    loadStatus();
  }).catch(e => {
    toast(e.error || 'Sync failed', 'error');
  }).finally(() => {
    btn.disabled = false;
    btn.textContent = 'Sync with Vision';
  });
}

function createOne(id, btn) {
  btn.disabled = true;
  api('POST', '/api/jobs', { account_ids: [id] }).then(data => {
    toast('Задача #' + data.job_id + ' запущена', 'success');
    setTimeout(loadAccounts, 2000);
  }).catch(e => toast(e.error || 'Ошибка', 'error'))
    .finally(() => { btn.disabled = false; });
}

function syncOne(id, btn) {
  btn.disabled = true;
  api('POST', '/api/sync', { account_ids: [id] }).then(() => {
    toast('Синхронизировано', 'success');
    loadAccounts();
  }).catch(e => toast(e.error || 'Ошибка', 'error'))
    .finally(() => { btn.disabled = false; });
}

function fraudCheck(id, btn) {
  btn.disabled = true;
  api('POST', '/api/accounts/' + id + '/fraud-check', {}).then(data => {
    const a = data.account || {};
    toast('Fraud score: ' + (a.fraud_score ?? '?'), 'success');
    loadAccounts();
  }).catch(e => toast(e.error || 'Ошибка', 'error'))
    .finally(() => { btn.disabled = false; });
}

function rotateProxy(id, btn) {
  if (tg && tg.showConfirm) {
    tg.showConfirm('Заменить прокси?', function(ok) {
      if (ok) doRotateProxy(id, btn);
    });
  } else if (confirm('Заменить прокси?')) {
    doRotateProxy(id, btn);
  }
}

function doRotateProxy(id, btn) {
  btn.disabled = true;
  const account = allAccounts.find(a => a.id === id);
  const country = account ? account.country : '';
  api('POST', '/api/accounts/' + id + '/rotate-proxy', { country: country }).then(() => {
    toast('Прокси заменён', 'success');
    loadAccounts();
  }).catch(e => toast(e.error || 'Ошибка', 'error'))
    .finally(() => { btn.disabled = false; });
}

function deleteOne(id, btn) {
  if (tg && tg.showConfirm) {
    tg.showConfirm('Удалить запись навсегда?', function(ok) {
      if (ok) doDelete(id, btn);
    });
  } else if (confirm('Удалить запись навсегда?')) {
    doDelete(id, btn);
  }
}

function doDelete(id, btn) {
  btn.disabled = true;
  api('DELETE', '/api/accounts/' + id, {delete_vision: false}).then(() => {
    toast('Удалено в корзину', 'success');
    loadAccounts();
  }).catch(e => toast(e.error || 'Ошибка', 'error'))
    .finally(() => { btn.disabled = false; });
}

const COUNTRY_LIST = [
  {code:'mz',name:'Mozambique'},{code:'ua',name:'Ukraine'},{code:'pl',name:'Poland'},
  {code:'de',name:'Germany'},{code:'fr',name:'France'},{code:'es',name:'Spain'},
  {code:'it',name:'Italy'},{code:'pt',name:'Portugal'},{code:'us',name:'USA'},
  {code:'gb',name:'UK'},{code:'ca',name:'Canada'},{code:'br',name:'Brazil'},
  {code:'mx',name:'Mexico'},{code:'tr',name:'Turkey'},{code:'in',name:'India'},
  {code:'id',name:'Indonesia'},{code:'vn',name:'Vietnam'},{code:'jp',name:'Japan'},
  {code:'au',name:'Australia'},{code:'za',name:'South Africa'},
];

function pickCountry(accountId) {
  const account = allAccounts.find(a => a.id === accountId);
  if (!account) return;
  const overlay = document.createElement('div');
  overlay.className = 'picker-overlay';
  overlay.onclick = function(e) { if (e.target === overlay) overlay.remove(); };
  const options = COUNTRY_LIST.map(c =>
    '<button class="picker-option' + (account.country === c.code ? ' selected' : '') +
    '" onclick="setCountry(' + accountId + ',\'' + c.code + '\')">' +
    c.code.toUpperCase() + ' ' + escapeHtml(c.name) + '</button>'
  ).join('');
  overlay.innerHTML = '<div class="picker-sheet">' +
    '<div class="picker-title">Выбери страну</div>' +
    '<div class="picker-grid">' + options + '</div></div>';
  document.body.appendChild(overlay);
}

function setCountry(id, code) {
  document.querySelector('.picker-overlay')?.remove();
  api('PATCH', '/api/accounts/' + id, {country: code}).then(() => {
    toast('Страна: ' + code.toUpperCase(), 'success');
    loadAccounts();
  }).catch(e => toast(e.error || 'Ошибка', 'error'));
}

function pickOS(accountId) {
  const account = allAccounts.find(a => a.id === accountId);
  if (!account) return;
  const overlay = document.createElement('div');
  overlay.className = 'picker-overlay';
  overlay.onclick = function(e) { if (e.target === overlay) overlay.remove(); };
  const osOptions = [
    {code: 'win', name: 'Windows'},
    {code: 'mac', name: 'macOS'},
  ];
  const options = osOptions.map(o =>
    '<button class="picker-option' + (account.fingerprint_os === o.code ? ' selected' : '') +
    '" onclick="setOS(' + accountId + ',\'' + o.code + '\')">' + o.name + '</button>'
  ).join('');
  overlay.innerHTML = '<div class="picker-sheet">' +
    '<div class="picker-title">Выбери ОС</div>' +
    '<div class="picker-grid">' + options + '</div></div>';
  document.body.appendChild(overlay);
}

function setOS(id, code) {
  document.querySelector('.picker-overlay')?.remove();
  api('PATCH', '/api/accounts/' + id, {fingerprint_os: code}).then(() => {
    toast('ОС: ' + (code === 'mac' ? 'macOS' : 'Windows'), 'success');
    loadAccounts();
  }).catch(e => toast(e.error || 'Ошибка', 'error'));
}

function escapeHtml(str) {
  if (!str) return '';
  return str.replace(/&/g, '&amp;').replace(/</g, '&lt;')
    .replace(/>/g, '&gt;').replace(/"/g, '&quot;');
}

// Initial load
loadStatus();
</script>
